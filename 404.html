const input = document.getElementById('searchInput');
const results = document.getElementById('searchResults');

input.addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (q.length < 1) { results.classList.add('hidden'); return; }

  const matches = bolts.filter(b => {
    const searchStr = (b.label + ' ' + b.size + ' ' + b.class).toLowerCase();
    return q.split(/\s+/).every(term => searchStr.includes(term));
  }).slice(0, 12);

  if (matches.length === 0) { results.classList.add('hidden'); return; }

  results.innerHTML = matches.map(b =>
    `<a href="${b.url}" class="flex items-center justify-between px-4 py-3 hover:bg-emerald-50 border-b border-gray-100 last:border-0">
      <div><span class="font-medium text-gray-900">${b.label}</span> <span class="text-xs text-gray-400 ml-1">${b.type}</span></div>
      <div class="text-sm"><span class="font-bold text-emerald-600">${b.nm} N·m</span> <span class="text-gray-400">/ ${b.ftlbs} ft·lbs</span></div>
    </a>`
  ).join('');
  results.classList.remove('hidden');
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('#searchInput') && !e.target.closest('#searchResults')) results.classList.add('hidden');
});

input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const first = results.querySelector('a');
    if (first) window.location.href = first.href;
  }
});
</script>
